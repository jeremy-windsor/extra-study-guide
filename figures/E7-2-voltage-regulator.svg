<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" width="700" height="480">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .comp { font-size: 13px; font-weight: bold; }
  </style>
  <rect width="700" height="480" fill="white"/>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold">Figure E7-2: Series Voltage Regulator</text>

  <!-- Input terminal -->
  <text x="25" y="154" font-size="14" font-weight="bold">Vin</text>
  <line x1="55" y1="150" x2="100" y2="150" stroke="black" stroke-width="2"/>

  <!-- C1: Input filter capacitor -->
  <line x1="100" y1="150" x2="100" y2="180" stroke="black" stroke-width="2"/>
  <!-- Capacitor plates -->
  <line x1="82" y1="180" x2="118" y2="180" stroke="black" stroke-width="2.5"/>
  <line x1="82" y1="190" x2="118" y2="190" stroke="black" stroke-width="2.5"/>
  <line x1="100" y1="190" x2="100" y2="380" stroke="black" stroke-width="2"/>
  <text x="125" y="190" class="comp">C1</text>
  <circle cx="100" cy="150" r="3" fill="black"/>

  <!-- Top rail from input to Q1 -->
  <line x1="100" y1="150" x2="250" y2="150" stroke="black" stroke-width="2"/>

  <!-- R1: Base drive resistor from input to zener/base junction -->
  <line x1="170" y1="150" x2="170" y2="190" stroke="black" stroke-width="2"/>
  <circle cx="170" cy="150" r="3" fill="black"/>
  <!-- Resistor zigzag -->
  <polyline points="170,190 162,198 178,210 162,222 178,234 162,246 178,258 170,266" fill="none" stroke="black" stroke-width="2"/>
  <line x1="170" y1="266" x2="170" y2="310" stroke="black" stroke-width="2"/>
  <text x="185" y="230" class="comp">R1</text>

  <!-- Junction at bottom of R1 (connects to zener and Q1 base) -->
  <circle cx="170" cy="310" r="3" fill="black"/>

  <!-- D1: Zener diode (from junction to ground) -->
  <line x1="170" y1="310" x2="170" y2="330" stroke="black" stroke-width="2"/>
  <!-- Zener diode triangle pointing down (anode at bottom, cathode at top = reverse bias) -->
  <polygon points="150,330 190,330 170,360" fill="none" stroke="black" stroke-width="2"/>
  <!-- Zener bar with bent ends -->
  <line x1="150" y1="360" x2="190" y2="360" stroke="black" stroke-width="2.5"/>
  <line x1="150" y1="360" x2="145" y2="354" stroke="black" stroke-width="2.5"/>
  <line x1="190" y1="360" x2="195" y2="366" stroke="black" stroke-width="2.5"/>
  <line x1="170" y1="360" x2="170" y2="380" stroke="black" stroke-width="2"/>
  <text x="198" y="350" class="comp">D1</text>
  <text x="198" y="365" font-size="10" fill="#555">(Zener)</text>

  <!-- Q1: Series pass transistor (NPN) -->
  <!-- Emitter at top (output), collector connected to Vin, base from zener junction -->
  <!-- Actually for a series pass NPN regulator: collector to Vin, emitter to output, base from reference -->
  <!-- Base at (250, 310) from junction -->
  <line x1="170" y1="310" x2="280" y2="310" stroke="black" stroke-width="2"/>

  <!-- Transistor Q1 -->
  <!-- Base input -->
  <line x1="280" y1="310" x2="310" y2="310" stroke="black" stroke-width="2"/>
  <!-- Vertical bar -->
  <line x1="310" y1="270" x2="310" y2="350" stroke="black" stroke-width="3"/>
  <!-- Collector going up to Vin rail -->
  <line x1="310" y1="282" x2="360" y2="240" stroke="black" stroke-width="2"/>
  <line x1="360" y1="240" x2="360" y2="150" stroke="black" stroke-width="2"/>
  <!-- Emitter going down then right to output -->
  <line x1="310" y1="338" x2="360" y2="380" stroke="black" stroke-width="2"/>
  <!-- Arrow on emitter pointing away -->
  <polygon points="345,370 360,380 350,362" fill="black"/>
  <line x1="360" y1="380" x2="360" y2="200" stroke="black" stroke-width="2"/>
  <!-- Wait, emitter should go to output rail. Let me redirect. -->
  <!-- Actually the emitter goes to the output. Let me place emitter going right. -->

  <!-- Correction: Emitter output line goes right -->
  <line x1="360" y1="380" x2="500" y2="380" stroke="black" stroke-width="2"/>
  <!-- Also connect emitter up to output rail -->
  <line x1="500" y1="380" x2="500" y2="150" stroke="black" stroke-width="2"/>

  <text x="340" y="290" class="comp">Q1</text>
  <text x="340" y="305" font-size="10" fill="#555">(Pass)</text>

  <!-- Output rail at top right -->
  <line x1="500" y1="150" x2="620" y2="150" stroke="black" stroke-width="2"/>

  <!-- C2: Output filter capacitor -->
  <circle cx="560" cy="150" r="3" fill="black"/>
  <line x1="560" y1="150" x2="560" y2="180" stroke="black" stroke-width="2"/>
  <!-- Capacitor plates -->
  <line x1="542" y1="180" x2="578" y2="180" stroke="black" stroke-width="2.5"/>
  <line x1="542" y1="190" x2="578" y2="190" stroke="black" stroke-width="2.5"/>
  <line x1="560" y1="190" x2="560" y2="380" stroke="black" stroke-width="2"/>
  <text x="585" y="190" class="comp">C2</text>

  <!-- Output terminal -->
  <text x="625" y="154" font-size="14" font-weight="bold">Vout</text>

  <!-- Ground rail -->
  <line x1="100" y1="380" x2="560" y2="380" stroke="black" stroke-width="2"/>
  <!-- Ground symbol -->
  <line x1="330" y1="380" x2="330" y2="400" stroke="black" stroke-width="2"/>
  <line x1="315" y1="400" x2="345" y2="400" stroke="black" stroke-width="2"/>
  <line x1="320" y1="406" x2="340" y2="406" stroke="black" stroke-width="1.5"/>
  <line x1="325" y1="412" x2="335" y2="412" stroke="black" stroke-width="1"/>
  <text x="330" y="428" text-anchor="middle" font-size="12">GND</text>

  <!-- Component descriptions -->
  <rect x="20" y="438" width="660" height="35" fill="#f8f8f8" stroke="#ccc" rx="4"/>
  <text x="350" y="456" text-anchor="middle" font-size="11">Q1 = Series pass transistor | D1 = Zener reference | C1 = Input filter | C2 = Output filter | R1 = Current-limiting resistor</text>
</svg>