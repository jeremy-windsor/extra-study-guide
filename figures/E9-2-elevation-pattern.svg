<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" width="700" height="600">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
  </style>
  <rect width="700" height="600" fill="white"/>

  <text x="350" y="25" text-anchor="middle" font-size="18" font-weight="bold">Figure E9-2: Antenna Radiation Pattern</text>
  <text x="350" y="45" text-anchor="middle" font-size="13">(Elevation / Vertical Plane)</text>

  <!-- The elevation pattern shows a half-circle (upper hemisphere) -->
  <!-- Ground is at the bottom. Center at 350, 430 -->
  <!-- Radius 230 px -->

  <!-- Ground line -->
  <line x1="60" y1="430" x2="640" y2="430" stroke="black" stroke-width="2.5"/>
  <text x="350" y="455" text-anchor="middle" font-size="12" fill="#555">Ground Plane</text>

  <!-- Semicircular grid (upper half only for elevation) -->
  <path d="M 120,430 A 230,230 0 0,1 580,430" fill="none" stroke="#ccc" stroke-width="1"/>
  <path d="M 166,430 A 184,184 0 0,1 534,430" fill="none" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,4"/>
  <path d="M 212,430 A 138,138 0 0,1 488,430" fill="none" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,4"/>
  <path d="M 258,430 A 92,92 0 0,1 442,430" fill="none" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,4"/>
  <path d="M 304,430 A 46,46 0 0,1 396,430" fill="none" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- dB scale labels -->
  <text x="583" y="445" font-size="9" fill="#888">0 dB</text>
  <text x="537" y="445" font-size="9" fill="#888">-5</text>
  <text x="491" y="445" font-size="9" fill="#888">-10</text>
  <text x="445" y="445" font-size="9" fill="#888">-15</text>
  <text x="399" y="445" font-size="9" fill="#888">-20</text>

  <!-- Radial lines at elevation angles -->
  <!-- 0 degrees (horizon, right) -->
  <line x1="350" y1="430" x2="580" y2="430" stroke="#ccc" stroke-width="0.5"/>
  <!-- 10 deg -->
  <line x1="350" y1="430" x2="576" y2="390" stroke="#ddd" stroke-width="0.3"/>
  <!-- 20 deg -->
  <line x1="350" y1="430" x2="566" y2="351" stroke="#ddd" stroke-width="0.3"/>
  <!-- 30 deg -->
  <line x1="350" y1="430" x2="549" y2="315" stroke="#ccc" stroke-width="0.5"/>
  <!-- 45 deg -->
  <line x1="350" y1="430" x2="513" y2="267" stroke="#ddd" stroke-width="0.3"/>
  <!-- 60 deg -->
  <line x1="350" y1="430" x2="465" y2="231" stroke="#ccc" stroke-width="0.5"/>
  <!-- 90 deg (zenith) -->
  <line x1="350" y1="430" x2="350" y2="200" stroke="#ccc" stroke-width="0.5"/>
  <!-- Left side angles -->
  <!-- 0 degrees (horizon, left) -->
  <line x1="350" y1="430" x2="120" y2="430" stroke="#ccc" stroke-width="0.5"/>
  <!-- 150 deg (=30 from left horizon) -->
  <line x1="350" y1="430" x2="151" y2="315" stroke="#ccc" stroke-width="0.5"/>
  <!-- 120 deg -->
  <line x1="350" y1="430" x2="235" y2="231" stroke="#ccc" stroke-width="0.5"/>

  <!-- Angle labels -->
  <text x="590" y="435" font-size="11">0&#176;</text>
  <text x="580" y="385" font-size="10">10&#176;</text>
  <text x="570" y="345" font-size="10">20&#176;</text>
  <text x="553" y="308" font-size="10">30&#176;</text>
  <text x="517" y="260" font-size="10">45&#176;</text>
  <text x="469" y="224" font-size="10">60&#176;</text>
  <text x="350" y="193" text-anchor="middle" font-size="11">90&#176;</text>
  <text x="95" y="435" font-size="11" text-anchor="end">0&#176;</text>

  <!-- Elevation radiation pattern -->
  <!-- Main lobe at about 20 degrees elevation, strong forward gain -->
  <!-- Pattern: peak at 20 deg, about 0dB (230px), falls off above and below -->
  <!-- Back radiation much weaker -->
  <!-- Using polar points: angle from horizon (0=right horizon), distance from center -->

  <!-- Forward direction is to the right (0 deg) -->
  <!-- Main lobe peaks at ~20 degrees elevation -->
  <path d="
    M 350,430
    Q 400,428 450,425
    C 490,415 530,395 560,370
    C 575,355 580,340 575,330
    C 568,315 555,310 540,318
    Q 520,330 500,355
    C 480,380 460,405 430,420
    Q 400,430 380,430
    L 350,430
  " fill="none" stroke="black" stroke-width="2.5"/>

  <!-- Minor upper lobe (above main lobe) -->
  <path d="
    M 540,318
    C 530,305 510,280 490,270
    Q 470,262 460,270
    C 450,280 455,295 470,310
    Q 485,325 500,340
    C 510,348 520,338 540,318
  " fill="none" stroke="black" stroke-width="2.5"/>

  <!-- Back lobe (left side, weaker) -->
  <path d="
    M 350,430
    Q 320,428 290,425
    C 270,420 250,410 240,400
    Q 225,385 230,375
    C 235,365 245,365 260,375
    Q 280,390 310,415
    C 330,425 340,430 350,430
  " fill="none" stroke="black" stroke-width="2.5"/>

  <!-- Annotations -->
  <!-- Main lobe label -->
  <line x1="565" y1="345" x2="610" y2="300" stroke="black" stroke-width="1"/>
  <text x="560" y="288" font-size="12" font-weight="bold">Main Lobe</text>

  <!-- Elevation angle of maximum radiation -->
  <!-- Draw an arc from horizon to the peak angle ~20 deg -->
  <path d="M 420,430 A 70,70 0 0,1 416,388" fill="none" stroke="red" stroke-width="1.5"/>
  <text x="438" y="410" font-size="11" fill="red" font-weight="bold">~20&#176;</text>
  <line x1="350" y1="430" x2="575" y2="330" stroke="red" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Back lobe label -->
  <line x1="240" y1="390" x2="175" y2="340" stroke="black" stroke-width="1"/>
  <text x="100" y="338" font-size="12" font-weight="bold">Back Lobe</text>

  <!-- Peak elevation annotation -->
  <text x="350" y="490" text-anchor="middle" font-size="12">Peak radiation at approximately 20&#176; elevation angle</text>
  <text x="350" y="510" text-anchor="middle" font-size="12">Front-to-Back Ratio = Main Lobe gain - Back Lobe gain (in dB)</text>

  <!-- Pattern type note -->
  <rect x="100" y="530" width="500" height="50" fill="#f8f8f8" stroke="#ccc" rx="4"/>
  <text x="350" y="550" text-anchor="middle" font-size="12" font-weight="bold">Elevation pattern of a horizontally polarized antenna</text>
  <text x="350" y="568" text-anchor="middle" font-size="11">Elevation angle is measured from the horizon (0&#176;) toward zenith (90&#176;)</text>
</svg>