<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .label { font-size: 13px; font-weight: bold; }
    .num { font-size: 16px; font-weight: bold; }
  </style>
  <rect width="820" height="440" fill="white"/>

  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="bold">Figure E6-3: Logic Gate Schematic Symbols</text>

  <!-- Symbol 1: AND Gate -->
  <g transform="translate(30, 80)">
    <text x="60" y="-10" text-anchor="middle" class="num">1</text>
    <!-- Body: flat left, curved right -->
    <path d="M 20,15 L 60,15 Q 110,15 110,55 Q 110,95 60,95 L 20,95 Z" fill="none" stroke="black" stroke-width="2"/>
    <!-- Inputs -->
    <line x1="0" y1="35" x2="20" y2="35" stroke="black" stroke-width="2"/>
    <line x1="0" y1="75" x2="20" y2="75" stroke="black" stroke-width="2"/>
    <!-- Output -->
    <line x1="110" y1="55" x2="135" y2="55" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="32" font-size="10">A</text>
    <text x="5" y="72" font-size="10">B</text>
    <text x="122" y="48" font-size="10">Out</text>
    <text x="65" y="130" text-anchor="middle" class="label">AND</text>
  </g>

  <!-- Symbol 2: OR Gate -->
  <g transform="translate(170, 80)">
    <text x="60" y="-10" text-anchor="middle" class="num">2</text>
    <!-- Body -->
    <path d="M 20,15 Q 40,15 70,15 Q 110,15 115,55 Q 110,95 70,95 Q 40,95 20,95 Q 40,55 20,15 Z" fill="none" stroke="black" stroke-width="2"/>
    <!-- Inputs -->
    <line x1="0" y1="35" x2="30" y2="35" stroke="black" stroke-width="2"/>
    <line x1="0" y1="75" x2="30" y2="75" stroke="black" stroke-width="2"/>
    <!-- Output -->
    <line x1="115" y1="55" x2="140" y2="55" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="32" font-size="10">A</text>
    <text x="5" y="72" font-size="10">B</text>
    <text x="123" y="48" font-size="10">Out</text>
    <text x="65" y="130" text-anchor="middle" class="label">OR</text>
  </g>

  <!-- Symbol 3: NOT Gate (Inverter) -->
  <g transform="translate(320, 80)">
    <text x="50" y="-10" text-anchor="middle" class="num">3</text>
    <!-- Triangle -->
    <polygon points="20,15 20,95 95,55" fill="none" stroke="black" stroke-width="2"/>
    <!-- Bubble -->
    <circle cx="102" cy="55" r="7" fill="none" stroke="black" stroke-width="2"/>
    <!-- Input -->
    <line x1="0" y1="55" x2="20" y2="55" stroke="black" stroke-width="2"/>
    <!-- Output -->
    <line x1="109" y1="55" x2="135" y2="55" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="48" font-size="10">In</text>
    <text x="118" y="48" font-size="10">Out</text>
    <text x="55" y="130" text-anchor="middle" class="label">NOT</text>
    <text x="55" y="145" text-anchor="middle" class="label">(Inverter)</text>
  </g>

  <!-- Symbol 4: NAND Gate -->
  <g transform="translate(460, 80)">
    <text x="65" y="-10" text-anchor="middle" class="num">4</text>
    <!-- Body: AND shape -->
    <path d="M 20,15 L 60,15 Q 110,15 110,55 Q 110,95 60,95 L 20,95 Z" fill="none" stroke="black" stroke-width="2"/>
    <!-- Bubble -->
    <circle cx="117" cy="55" r="7" fill="none" stroke="black" stroke-width="2"/>
    <!-- Inputs -->
    <line x1="0" y1="35" x2="20" y2="35" stroke="black" stroke-width="2"/>
    <line x1="0" y1="75" x2="20" y2="75" stroke="black" stroke-width="2"/>
    <!-- Output -->
    <line x1="124" y1="55" x2="150" y2="55" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="32" font-size="10">A</text>
    <text x="5" y="72" font-size="10">B</text>
    <text x="133" y="48" font-size="10">Out</text>
    <text x="65" y="130" text-anchor="middle" class="label">NAND</text>
  </g>

  <!-- Symbol 5: NOR Gate -->
  <g transform="translate(610, 80)">
    <text x="65" y="-10" text-anchor="middle" class="num">5</text>
    <!-- Body: OR shape -->
    <path d="M 20,15 Q 40,15 70,15 Q 110,15 115,55 Q 110,95 70,95 Q 40,95 20,95 Q 40,55 20,15 Z" fill="none" stroke="black" stroke-width="2"/>
    <!-- Bubble -->
    <circle cx="122" cy="55" r="7" fill="none" stroke="black" stroke-width="2"/>
    <!-- Inputs -->
    <line x1="0" y1="35" x2="30" y2="35" stroke="black" stroke-width="2"/>
    <line x1="0" y1="75" x2="30" y2="75" stroke="black" stroke-width="2"/>
    <!-- Output -->
    <line x1="129" y1="55" x2="155" y2="55" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="32" font-size="10">A</text>
    <text x="5" y="72" font-size="10">B</text>
    <text x="138" y="48" font-size="10">Out</text>
    <text x="65" y="130" text-anchor="middle" class="label">NOR</text>
  </g>

  <!-- Symbol 6: XOR Gate -->
  <g transform="translate(140, 270)">
    <text x="65" y="-10" text-anchor="middle" class="num">6</text>
    <!-- Body: OR shape -->
    <path d="M 25,15 Q 45,15 75,15 Q 115,15 120,55 Q 115,95 75,95 Q 45,95 25,95 Q 45,55 25,15 Z" fill="none" stroke="black" stroke-width="2"/>
    <!-- Extra input curve (XOR characteristic) -->
    <path d="M 18,15 Q 38,55 18,95" fill="none" stroke="black" stroke-width="2"/>
    <!-- Inputs -->
    <line x1="0" y1="35" x2="33" y2="35" stroke="black" stroke-width="2"/>
    <line x1="0" y1="75" x2="33" y2="75" stroke="black" stroke-width="2"/>
    <!-- Output -->
    <line x1="120" y1="55" x2="150" y2="55" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="32" font-size="10">A</text>
    <text x="5" y="72" font-size="10">B</text>
    <text x="128" y="48" font-size="10">Out</text>
    <text x="70" y="130" text-anchor="middle" class="label">XOR</text>
  </g>

  <!-- Truth table summary -->
  <g transform="translate(370, 270)">
    <text x="0" y="0" font-size="12" font-weight="bold">Quick Reference:</text>
    <text x="0" y="18" font-size="11">AND: Output HIGH only when ALL inputs HIGH</text>
    <text x="0" y="34" font-size="11">OR: Output HIGH when ANY input HIGH</text>
    <text x="0" y="50" font-size="11">NOT: Output is inverse of input</text>
    <text x="0" y="66" font-size="11">NAND: AND + inversion (bubble)</text>
    <text x="0" y="82" font-size="11">NOR: OR + inversion (bubble)</text>
    <text x="0" y="98" font-size="11">XOR: Output HIGH when inputs DIFFER</text>
  </g>

  <text x="410" y="425" text-anchor="middle" font-size="11" fill="#555">The small circle (bubble) at the output indicates logical inversion (NOT).</text>
</svg>