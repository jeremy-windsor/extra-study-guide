<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 700" width="650" height="700">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
  </style>
  <rect width="650" height="700" fill="white"/>

  <text x="325" y="30" text-anchor="middle" font-size="18" font-weight="bold">Figure E9-3: Smith Chart Structure</text>

  <defs>
    <clipPath id="smithClip3">
      <circle cx="325" cy="340" r="230"/>
    </clipPath>
  </defs>

  <!-- Outer boundary circle — Pure Reactance Circle -->
  <circle cx="325" cy="340" r="230" fill="none" stroke="black" stroke-width="3"/>

  <!-- Label the outer circle -->
  <line x1="555" y1="340" x2="600" y2="280" stroke="red" stroke-width="1.5"/>
  <text x="490" y="265" font-size="13" fill="red" font-weight="bold">Outer Circle:</text>
  <text x="490" y="282" font-size="12" fill="red">Pure Resistance</text>
  <text x="490" y="297" font-size="12" fill="red">(R only, X = 0)</text>

  <!-- Resistance circles (constant R) -->
  <!-- R=0: the outer circle itself (already drawn) -->

  <!-- R=0.2: -->
  <circle cx="363.33" cy="340" r="191.67" fill="none" stroke="#999" stroke-width="0.5" clip-path="url(#smithClip3)"/>

  <!-- R=0.5: -->
  <circle cx="401.67" cy="340" r="153.33" fill="none" stroke="#999" stroke-width="0.7" clip-path="url(#smithClip3)"/>

  <!-- R=1.0: center of chart -->
  <circle cx="440" cy="340" r="115" fill="none" stroke="#666" stroke-width="1" clip-path="url(#smithClip3)"/>

  <!-- R=2.0: -->
  <circle cx="478.33" cy="340" r="76.67" fill="none" stroke="#999" stroke-width="0.7" clip-path="url(#smithClip3)"/>

  <!-- R=5.0: -->
  <circle cx="516.67" cy="340" r="38.33" fill="none" stroke="#999" stroke-width="0.5" clip-path="url(#smithClip3)"/>

  <!-- Reactance arcs (constant X) - upper half (inductive, +jX) -->
  <!-- X=0.2 -->
  <circle cx="555" cy="-810" r="1150" fill="none" stroke="#999" stroke-width="0.5" clip-path="url(#smithClip3)"/>

  <!-- X=0.5 -->
  <circle cx="555" cy="-120" r="460" fill="none" stroke="#999" stroke-width="0.7" clip-path="url(#smithClip3)"/>

  <!-- X=1.0 -->
  <circle cx="555" cy="110" r="230" fill="none" stroke="#666" stroke-width="1" clip-path="url(#smithClip3)"/>

  <!-- X=2.0 -->
  <circle cx="555" cy="225" r="115" fill="none" stroke="#999" stroke-width="0.7" clip-path="url(#smithClip3)"/>

  <!-- X=5.0 -->
  <circle cx="555" cy="294" r="46" fill="none" stroke="#999" stroke-width="0.5" clip-path="url(#smithClip3)"/>

  <!-- Reactance arcs - lower half (capacitive, -jX) -->
  <!-- X=-0.2 -->
  <circle cx="555" cy="1490" r="1150" fill="none" stroke="#999" stroke-width="0.5" clip-path="url(#smithClip3)"/>

  <!-- X=-0.5 -->
  <circle cx="555" cy="800" r="460" fill="none" stroke="#999" stroke-width="0.7" clip-path="url(#smithClip3)"/>

  <!-- X=-1.0 -->
  <circle cx="555" cy="570" r="230" fill="none" stroke="#666" stroke-width="1" clip-path="url(#smithClip3)"/>

  <!-- X=-2.0 -->
  <circle cx="555" cy="455" r="115" fill="none" stroke="#999" stroke-width="0.7" clip-path="url(#smithClip3)"/>

  <!-- X=-5.0 -->
  <circle cx="555" cy="386" r="46" fill="none" stroke="#999" stroke-width="0.5" clip-path="url(#smithClip3)"/>

  <!-- THE ONLY STRAIGHT LINE: Resistance Axis (Real Axis) -->
  <line x1="95" y1="340" x2="555" y2="340" stroke="black" stroke-width="2.5"/>

  <!-- Label the resistance axis prominently -->
  <line x1="200" y1="340" x2="140" y2="420" stroke="red" stroke-width="1.5"/>
  <text x="30" y="418" font-size="13" fill="red" font-weight="bold">Resistance Axis</text>
  <text x="30" y="435" font-size="12" fill="red">(Real Axis / Only</text>
  <text x="30" y="452" font-size="12" fill="red">straight line on chart)</text>

  <!-- Label key points on the resistance axis -->
  <circle cx="95" cy="340" r="4" fill="black"/>
  <text x="95" y="330" text-anchor="middle" font-size="10">0</text>
  <text x="95" y="365" text-anchor="middle" font-size="9">(Short)</text>

  <circle cx="325" cy="340" r="4" fill="black"/>
  <text x="325" y="330" text-anchor="middle" font-size="10">1 (Z0)</text>

  <circle cx="555" cy="340" r="4" fill="black"/>
  <text x="555" y="330" text-anchor="middle" font-size="10">inf</text>
  <text x="555" y="365" text-anchor="middle" font-size="9">(Open)</text>

  <!-- Resistance circle labels -->
  <text x="367" y="332" font-size="9" fill="#666">0.2</text>
  <text x="405" y="332" font-size="9" fill="#666">0.5</text>
  <text x="480" y="332" font-size="9" fill="#666">2</text>
  <text x="518" y="332" font-size="9" fill="#666">5</text>

  <!-- Reactance labels -->
  <text x="560" y="113" font-size="9" fill="#666">j1</text>
  <text x="560" y="228" font-size="9" fill="#666">j2</text>
  <text x="560" y="298" font-size="9" fill="#666">j5</text>
  <text x="560" y="570" font-size="9" fill="#666">-j1</text>
  <text x="560" y="458" font-size="9" fill="#666">-j2</text>
  <text x="560" y="390" font-size="9" fill="#666">-j5</text>

  <!-- Region labels -->
  <text x="325" y="220" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">Inductive Region (+jX)</text>
  <text x="325" y="475" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">Capacitive Region (-jX)</text>

  <!-- Key features box -->
  <rect x="30" y="590" width="590" height="100" fill="#f8f8f8" stroke="#ccc" rx="4"/>
  <text x="325" y="612" text-anchor="middle" font-size="13" font-weight="bold">Key Smith Chart Features:</text>
  <text x="40" y="632" font-size="11">1. Outer circle = Pure resistance (zero reactance). All points on it have X = 0.</text>
  <text x="40" y="650" font-size="11">2. Horizontal line (resistance axis) = The ONLY straight line on the chart.</text>
  <text x="40" y="668" font-size="11">3. Center point = Characteristic impedance Z0 (matched condition, VSWR = 1:1).</text>
  <text x="40" y="686" font-size="11">4. Left end = Short circuit (Z = 0). Right end = Open circuit (Z = infinity).</text>
</svg>