<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .label { font-size: 13px; font-weight: bold; }
    .sublabel { font-size: 11px; }
    .num { font-size: 16px; font-weight: bold; }
  </style>
  <rect width="800" height="400" fill="white"/>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold">Figure E6-2: Diode Schematic Symbols</text>

  <!-- Symbol 1: Standard Diode -->
  <g transform="translate(50, 100)">
    <text x="50" y="-15" text-anchor="middle" class="num">1</text>
    <!-- Anode lead -->
    <line x1="0" y1="50" x2="30" y2="50" stroke="black" stroke-width="2"/>
    <!-- Triangle (anode) -->
    <polygon points="30,30 30,70 65,50" fill="none" stroke="black" stroke-width="2"/>
    <!-- Bar (cathode) -->
    <line x1="65" y1="30" x2="65" y2="70" stroke="black" stroke-width="2.5"/>
    <!-- Cathode lead -->
    <line x1="65" y1="50" x2="100" y2="50" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="75" class="sublabel">A</text>
    <text x="85" y="75" class="sublabel">K</text>
    <text x="50" y="110" text-anchor="middle" class="label">Standard</text>
    <text x="50" y="125" text-anchor="middle" class="label">Diode</text>
  </g>

  <!-- Symbol 2: Zener Diode -->
  <g transform="translate(180, 100)">
    <text x="50" y="-15" text-anchor="middle" class="num">2</text>
    <!-- Anode lead -->
    <line x1="0" y1="50" x2="30" y2="50" stroke="black" stroke-width="2"/>
    <!-- Triangle -->
    <polygon points="30,30 30,70 65,50" fill="none" stroke="black" stroke-width="2"/>
    <!-- Zener bar (bent ends) -->
    <line x1="65" y1="30" x2="65" y2="70" stroke="black" stroke-width="2.5"/>
    <line x1="65" y1="30" x2="58" y2="23" stroke="black" stroke-width="2.5"/>
    <line x1="65" y1="70" x2="72" y2="77" stroke="black" stroke-width="2.5"/>
    <!-- Cathode lead -->
    <line x1="65" y1="50" x2="100" y2="50" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="75" class="sublabel">A</text>
    <text x="85" y="75" class="sublabel">K</text>
    <text x="50" y="110" text-anchor="middle" class="label">Zener</text>
    <text x="50" y="125" text-anchor="middle" class="label">Diode</text>
  </g>

  <!-- Symbol 3: Schottky Diode -->
  <g transform="translate(310, 100)">
    <text x="50" y="-15" text-anchor="middle" class="num">3</text>
    <!-- Anode lead -->
    <line x1="0" y1="50" x2="30" y2="50" stroke="black" stroke-width="2"/>
    <!-- Triangle -->
    <polygon points="30,30 30,70 65,50" fill="none" stroke="black" stroke-width="2"/>
    <!-- Schottky bar (S-shaped ends) -->
    <line x1="65" y1="30" x2="65" y2="70" stroke="black" stroke-width="2.5"/>
    <!-- Top hook curving left -->
    <line x1="65" y1="30" x2="58" y2="30" stroke="black" stroke-width="2.5"/>
    <line x1="58" y1="30" x2="58" y2="36" stroke="black" stroke-width="2.5"/>
    <!-- Bottom hook curving right -->
    <line x1="65" y1="70" x2="72" y2="70" stroke="black" stroke-width="2.5"/>
    <line x1="72" y1="70" x2="72" y2="64" stroke="black" stroke-width="2.5"/>
    <!-- Cathode lead -->
    <line x1="65" y1="50" x2="100" y2="50" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="75" class="sublabel">A</text>
    <text x="85" y="75" class="sublabel">K</text>
    <text x="50" y="110" text-anchor="middle" class="label">Schottky</text>
    <text x="50" y="125" text-anchor="middle" class="label">Diode</text>
  </g>

  <!-- Symbol 4: LED -->
  <g transform="translate(440, 100)">
    <text x="50" y="-15" text-anchor="middle" class="num">4</text>
    <!-- Anode lead -->
    <line x1="0" y1="50" x2="30" y2="50" stroke="black" stroke-width="2"/>
    <!-- Triangle -->
    <polygon points="30,30 30,70 65,50" fill="none" stroke="black" stroke-width="2"/>
    <!-- Bar (cathode) -->
    <line x1="65" y1="30" x2="65" y2="70" stroke="black" stroke-width="2.5"/>
    <!-- Cathode lead -->
    <line x1="65" y1="50" x2="100" y2="50" stroke="black" stroke-width="2"/>
    <!-- Light arrows -->
    <line x1="52" y1="25" x2="62" y2="10" stroke="black" stroke-width="1.5"/>
    <polygon points="59,7 65,7 62,14" fill="black"/>
    <line x1="42" y1="30" x2="52" y2="15" stroke="black" stroke-width="1.5"/>
    <polygon points="49,12 55,12 52,19" fill="black"/>
    <!-- Labels -->
    <text x="5" y="75" class="sublabel">A</text>
    <text x="85" y="75" class="sublabel">K</text>
    <text x="50" y="110" text-anchor="middle" class="label">LED</text>
  </g>

  <!-- Symbol 5: Varactor Diode -->
  <g transform="translate(570, 100)">
    <text x="50" y="-15" text-anchor="middle" class="num">5</text>
    <!-- Anode lead -->
    <line x1="0" y1="50" x2="30" y2="50" stroke="black" stroke-width="2"/>
    <!-- Triangle -->
    <polygon points="30,30 30,70 65,50" fill="none" stroke="black" stroke-width="2"/>
    <!-- Double bar (capacitor-like cathode) -->
    <line x1="65" y1="30" x2="65" y2="70" stroke="black" stroke-width="2.5"/>
    <line x1="70" y1="30" x2="70" y2="70" stroke="black" stroke-width="2.5"/>
    <!-- Cathode lead -->
    <line x1="70" y1="50" x2="100" y2="50" stroke="black" stroke-width="2"/>
    <!-- Labels -->
    <text x="5" y="75" class="sublabel">A</text>
    <text x="85" y="75" class="sublabel">K</text>
    <text x="50" y="110" text-anchor="middle" class="label">Varactor</text>
    <text x="50" y="125" text-anchor="middle" class="label">Diode</text>
  </g>

  <!-- Symbol 6: PIN Diode -->
  <g transform="translate(700, 100)">
    <text x="42" y="-15" text-anchor="middle" class="num">6</text>
    <!-- Anode lead -->
    <line x1="0" y1="50" x2="22" y2="50" stroke="black" stroke-width="2"/>
    <!-- Triangle -->
    <polygon points="22,30 22,70 57,50" fill="none" stroke="black" stroke-width="2"/>
    <!-- Bar (cathode) -->
    <line x1="57" y1="30" x2="57" y2="70" stroke="black" stroke-width="2.5"/>
    <!-- Cathode lead -->
    <line x1="57" y1="50" x2="85" y2="50" stroke="black" stroke-width="2"/>
    <!-- Rectangular box around the diode to indicate PIN -->
    <rect x="15" y="22" width="50" height="56" fill="none" stroke="black" stroke-width="1.5"/>
    <!-- Labels -->
    <text x="5" y="75" class="sublabel">A</text>
    <text x="72" y="75" class="sublabel">K</text>
    <text x="42" y="110" text-anchor="middle" class="label">PIN</text>
    <text x="42" y="125" text-anchor="middle" class="label">Diode</text>
  </g>

  <!-- Footer -->
  <text x="400" y="370" text-anchor="middle" font-size="11" fill="#555">A = Anode (positive), K = Cathode (negative). Current flows from A to K.</text>
  <text x="400" y="388" text-anchor="middle" font-size="11" fill="#555">Triangle points in direction of conventional current flow.</text>
</svg>